# Unlimited-OCR — PDF → Markdown
#
#   CPU (기본):  docker compose up -d --build          → http://localhost:8000
#   CUDA:        docker compose --profile cuda up -d --build ocr-cuda
#                                                       → http://localhost:8001
#
# 기본 프로필은 .env의 COMPOSE_PROFILES=cpu 로 지정된다.
# 모델 가중치(~6.7GB)는 최초 실행 시 hf-cache 볼륨에 1회 다운로드된다.
# Metal(Apple Silicon)은 컨테이너에서 GPU를 쓸 수 없어 로컬 uv로 실행한다 — README §macOS 참조.

services:
  ocr-cpu:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        TORCH_VARIANT: cpu
    image: unlimited-ocr-web:cpu
    profiles: ["cpu"]
    ports:
      - "8000:8000"
    environment:
      OCR_DEVICE: cpu
      OCR_DTYPE: ${OCR_DTYPE:-auto}
      OCR_ENGINE: ${OCR_ENGINE:-unlimited}
      MODEL_ID: ${MODEL_ID:-baidu/Unlimited-OCR}
      PRELOAD_MODEL: ${PRELOAD_MODEL:-1}
      PAGES_PER_CHUNK: ${PAGES_PER_CHUNK:-8}
      RENDER_DPI: ${RENDER_DPI:-200}
      MAX_PAGES: ${MAX_PAGES:-200}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-100}
      HF_TOKEN: ${HF_TOKEN:-}
      OCR_CPU_THREADS: ${OCR_CPU_THREADS:-0}
      OCR_FAST_DECODE: ${OCR_FAST_DECODE:-1}
      OCR_DECODE_BLOCK: ${OCR_DECODE_BLOCK:-8}
      # ── 한국어 번역 (OpenAI 호환 API) — 미설정 시 번역 기능만 비활성 ──
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      TRANSLATE_MODEL: ${TRANSLATE_MODEL:-}
      TRANSLATE_API_MODE: ${TRANSLATE_API_MODE:-auto}
      TRANSLATE_CONCURRENCY: ${TRANSLATE_CONCURRENCY:-4}
      TRANSLATE_TIMEOUT_S: ${TRANSLATE_TIMEOUT_S:-180}
      TRANSLATE_MAX_RETRIES: ${TRANSLATE_MAX_RETRIES:-3}
      TRANSLATE_TEMPERATURE: ${TRANSLATE_TEMPERATURE:-0}
      TRANSLATE_MAX_TOKENS_PARAM: ${TRANSLATE_MAX_TOKENS_PARAM:-max_tokens}
      TRANSLATE_REASONING: ${TRANSLATE_REASONING:-}
    volumes:
      - ocr-data:/data
      - hf-cache:/data/hf
    restart: unless-stopped

  ocr-cuda:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        TORCH_VARIANT: cu129
    image: unlimited-ocr-web:cuda
    profiles: ["cuda"]
    gpus: all
    ports:
      - "8001:8000"
    environment:
      OCR_DEVICE: cuda
      OCR_DTYPE: ${OCR_DTYPE:-auto}
      OCR_ENGINE: ${OCR_ENGINE:-unlimited}
      MODEL_ID: ${MODEL_ID:-baidu/Unlimited-OCR}
      PRELOAD_MODEL: ${PRELOAD_MODEL:-1}
      PAGES_PER_CHUNK: ${PAGES_PER_CHUNK:-8}
      RENDER_DPI: ${RENDER_DPI:-200}
      MAX_PAGES: ${MAX_PAGES:-200}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-100}
      HF_TOKEN: ${HF_TOKEN:-}
      # GPU_DEVICE=1 로 두 번째 GPU 선택 가능 (기본 0)
      CUDA_VISIBLE_DEVICES: ${GPU_DEVICE:-0}
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      OCR_FAST_DECODE: ${OCR_FAST_DECODE:-1}
      OCR_DECODE_BLOCK: ${OCR_DECODE_BLOCK:-8}
      # ── 한국어 번역 (OpenAI 호환 API) — 미설정 시 번역 기능만 비활성 ──
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      TRANSLATE_MODEL: ${TRANSLATE_MODEL:-}
      TRANSLATE_API_MODE: ${TRANSLATE_API_MODE:-auto}
      TRANSLATE_CONCURRENCY: ${TRANSLATE_CONCURRENCY:-4}
      TRANSLATE_TIMEOUT_S: ${TRANSLATE_TIMEOUT_S:-180}
      TRANSLATE_MAX_RETRIES: ${TRANSLATE_MAX_RETRIES:-3}
      TRANSLATE_TEMPERATURE: ${TRANSLATE_TEMPERATURE:-0}
      TRANSLATE_MAX_TOKENS_PARAM: ${TRANSLATE_MAX_TOKENS_PARAM:-max_tokens}
      TRANSLATE_REASONING: ${TRANSLATE_REASONING:-}
    volumes:
      - ocr-data:/data
      - hf-cache:/data/hf
    restart: unless-stopped

volumes:
  ocr-data:
  hf-cache:
